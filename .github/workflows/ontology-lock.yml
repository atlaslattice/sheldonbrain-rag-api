name: Ontology Lock Gate

on:
  pull_request:
    paths:
      - 'canonical/**'
  push:
    paths:
      - 'canonical/**'

jobs:
  ontology-lock-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify canonical file integrity
        run: |
          echo "=== Ontology Lock Gate ==="
          echo "Checking canonical/ file hashes against VENDORED_FROM.md"
          
          # Compute SHA-256 hashes of all canonical Python/YAML files
          FAIL=0
          for f in canonical/lattice_ontology_v2.py canonical/sphere_classifier_v2.py canonical/lattice_ontology.yaml; do
            if [ -f "$f" ]; then
              HASH=$(sha256sum "$f" | cut -d' ' -f1)
              echo "$f: $HASH"
            else
              echo "MISSING: $f"
              FAIL=1
            fi
          done
          
          # Verify VENDORED_FROM.md exists and documents provenance
          if [ ! -f "canonical/VENDORED_FROM.md" ]; then
            echo "FAIL: canonical/VENDORED_FROM.md is missing"
            FAIL=1
          else
            echo "VENDORED_FROM.md present"
            # Check it documents a source commit
            if ! grep -q "commit" canonical/VENDORED_FROM.md; then
              echo "WARNING: VENDORED_FROM.md does not document source commit"
            fi
          fi
          
          if [ "$FAIL" -ne 0 ]; then
            echo "ONTOLOGY LOCK GATE: FAILED"
            exit 1
          fi
          echo "ONTOLOGY LOCK GATE: PASSED"

      - name: Run ontology migration tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and test
        run: |
          pip install numpy pytest
          python -m pytest tests/test_ontology_migration.py -v
